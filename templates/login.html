<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Maha E-Seva Kendra</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-box { background: #fff; border-radius: 14px; box-shadow: 0 20px 60px rgba(0,0,0,.35); width: 380px; padding: 40px 36px; }
    .login-box .brand { text-align: center; margin-bottom: 28px; }
    .login-box .brand h1 { font-size: 1.4rem; color: #1a1a2e; margin-top: 8px; }
    .login-box .brand p { color: #888; font-size: 0.85rem; margin-top: 4px; }
    .logo { font-size: 2.4rem; }
    label { display: block; margin-bottom: 5px; font-size: 0.85rem; color: #555; font-weight: 500; }
    input { width: 100%; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 7px; font-size: 0.95rem; margin-bottom: 16px; transition: border-color .15s; }
    input:focus { outline: none; border-color: #3942b0; }
    button { width: 100%; padding: 11px; background: #3942b0; color: #fff; border: none; border-radius: 7px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background .15s; margin-top: 4px; }
    button:hover { background: #2c3490; }
    .alert { padding: 10px 14px; border-radius: 7px; background: #fde8e8; color: #c62828; border-left: 4px solid #c62828; margin-bottom: 16px; font-size: 0.88rem; }
    .footer-note { text-align: center; margin-top: 20px; font-size: 0.78rem; color: #aaa; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="brand">
      <div class="logo">🏛️</div>
      <h1>Maha E-Seva Kendra</h1>
      <p>Central Management Portal</p>
    </div>
    {% if error %}
    <div class="alert">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/login">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" placeholder="Enter username" required autofocus/>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" placeholder="Enter password" required/>
      <button type="submit">Login →</button>
    </form>
    <p class="footer-note">🔒 Secure access. Contact admin for credentials.</p>
  </div>
</body>
</html>
